services:

  postgres:
    image: postgres:16
    container_name: codejudge-postgres

    environment:
      POSTGRES_DB: CodeJudge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yuvrajverm@05

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: codejudge-rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres-data: