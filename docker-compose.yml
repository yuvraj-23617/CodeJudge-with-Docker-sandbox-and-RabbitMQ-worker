version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: codejudge-postgres

    environment:
      POSTGRES_DB: CodeJudge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yuvrajverm@05

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: codejudge-rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

  codejudge:
    build: .

    container_name: codejudge-app

    depends_on:
      - postgres
      - rabbitmq

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/CodeJudge
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: yuvrajverm@05

      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672

volumes:
  postgres-data: